services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    dns:
      - 8.8.8.8
    volumes:
      - .:/var/www/html:cached
    environment:
      - APP_ENV=dev
      - APP_SECRET=1358dbbe68fbfae214d0263f35f2ee37

  nginx:
    image: nginx:alpine
    dns:
      - 8.8.8.8
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html:cached
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
